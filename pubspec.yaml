name: gouderakpossedartapp
description: De Gouderak Dart App - A competitive darts counter with multiplayer and leaderboards.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^14.0.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  fl_chart: ^0.68.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  intl: ^0.19.0
  flutter_tts: ^4.2.5
  firebase_app_check: ^0.3.2+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
